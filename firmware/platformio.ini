; PlatformIO project for PotPi ESP8266 firmware
;
; Build:  pio run
; Upload: pio run -t upload
; Serial: pio device monitor (default 115200)

[platformio]
default_envs = nodemcuv2

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino

upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001
monitor_speed = 115200
upload_speed = 460800

; CPU at 160 MHz for faster TLS handshakes; the GitHub HTTPS POST is the heaviest op
board_build.f_cpu = 160000000L

; LittleFS over SPIFFS — better wear levelling, modern default
board_build.filesystem = littlefs

build_flags =
    -DBEARSSL_SSL_BASIC
    -DMMU_IRAM_HEAP

; Library dependencies — pinned to recent maintained versions
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

; Optional: serial filter to colourise log lines
monitor_filters = esp8266_exception_decoder, time
