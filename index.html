<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PotPi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root {
    --bg: #0A0A0A;
    --surface: #111111;
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.12);
    --text-1: #FAFAFA;
    --text-2: #A3A3A3;
    --text-3: #525252;
    --accent: #34D399;
    --warn: #F59E0B;
    --error: #F87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text-1);
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "tnum", "cv11";
    font-variant-numeric: tabular-nums;
    min-height: 100vh;
    line-height: 1.5;
  }

  .mono {
    font-family: 'Geist Mono', ui-monospace, SFMono-Regular, monospace;
    font-feature-settings: "tnum", "zero";
    font-variant-numeric: tabular-nums;
  }

  .container {
    max-width: 1160px;
    margin: 0 auto;
    padding: 56px 32px 80px;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 48px;
    border-bottom: 1px solid var(--border);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .brand-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px rgba(52, 211, 153, 0.55);
  }

  .brand-dot.invalid {
    background: var(--error);
    box-shadow: 0 0 12px rgba(248, 113, 113, 0.55);
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12px;
    color: var(--text-2);
  }

  .pulse {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    position: relative;
  }

  .pulse::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.3;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(0.6); opacity: 0.5; }
    100% { transform: scale(2.2); opacity: 0; }
  }

  /* Hero section */
  .hero {
    padding: 80px 0 72px;
    border-bottom: 1px solid var(--border);
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 28px;
  }

  .hero-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 48px;
    flex-wrap: wrap;
  }

  .hero-number {
    font-family: 'Geist', sans-serif;
    font-weight: 400;
    font-size: clamp(80px, 14vw, 160px);
    line-height: 0.9;
    letter-spacing: -0.04em;
    color: var(--text-1);
    font-feature-settings: "tnum";
    font-variant-numeric: tabular-nums;
    display: flex;
    align-items: baseline;
  }

  .hero-unit {
    font-size: 0.28em;
    color: var(--text-3);
    margin-left: 0.15em;
    letter-spacing: -0.02em;
    font-weight: 400;
  }

  .hero-meta {
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: flex-end;
    text-align: right;
    padding-bottom: 14px;
    min-width: 200px;
  }

  .hero-meta-label {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-3);
  }

  .hero-meta-value {
    font-size: 14px;
    color: var(--text-1);
    letter-spacing: -0.01em;
  }

  .hero-meta-value .sub {
    color: var(--text-3);
    margin-left: 8px;
  }

  /* Section */
  section {
    padding: 56px 0;
    border-bottom: 1px solid var(--border);
  }
  section:last-of-type { border-bottom: none; }

  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-2);
  }

  /* Sensor grid */
  .sensor-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .sensor-card {
    background: var(--surface);
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .sensor-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sensor-name {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-2);
  }

  .sensor-state {
    font-size: 11px;
    color: var(--text-3);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .sensor-state .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
  }

  .sensor-body {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
  }

  .sensor-pct {
    font-family: 'Geist Mono', monospace;
    font-size: 40px;
    font-weight: 400;
    letter-spacing: -0.03em;
    color: var(--text-1);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .sensor-pct .unit {
    font-size: 18px;
    color: var(--text-3);
    margin-left: 4px;
  }

  .sensor-volt {
    text-align: right;
  }

  .sensor-volt-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 6px;
  }

  .sensor-volt-value {
    font-family: 'Geist Mono', monospace;
    font-size: 14px;
    color: var(--text-2);
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
  }

  .sensor-bar {
    height: 2px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 1px;
    overflow: hidden;
  }

  .sensor-bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  /* Window selector */
  .window-selector {
    display: inline-flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px;
    gap: 2px;
  }

  .window-btn {
    background: transparent;
    border: none;
    color: var(--text-2);
    font-family: 'Geist', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: -0.01em;
    transition: all 0.15s ease;
  }

  .window-btn:hover {
    color: var(--text-1);
  }

  .window-btn.active {
    background: rgba(255, 255, 255, 0.06);
    color: var(--text-1);
  }

  /* Chart */
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 32px;
    position: relative;
  }

  .chart-canvas-wrap {
    height: 320px;
    position: relative;
  }

  .chart-empty {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-3);
    font-size: 13px;
  }

  /* Watering log table */
  .log-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .log-table th {
    text-align: left;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-3);
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.015);
  }

  .log-table td {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-1);
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
  }

  .log-table tr:last-child td {
    border-bottom: none;
  }

  .log-table td.mono {
    color: var(--text-2);
  }

  .log-empty {
    padding: 40px 24px;
    text-align: center;
    color: var(--text-3);
    font-size: 13px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
  }

  /* Health banner */
  .health-banner {
    background: rgba(248, 113, 113, 0.06);
    border: 1px solid rgba(248, 113, 113, 0.2);
    border-radius: 6px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 32px;
  }

  .health-banner-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--error);
    flex-shrink: 0;
  }

  .health-banner-text {
    font-size: 13px;
    color: var(--text-1);
    letter-spacing: -0.01em;
  }

  .health-banner-text .label {
    color: var(--error);
    font-weight: 500;
    margin-right: 8px;
  }

  /* Footer */
  footer {
    padding: 48px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    color: var(--text-3);
    font-size: 12px;
  }

  footer a {
    color: var(--text-2);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1px;
    transition: color 0.15s ease, border-color 0.15s ease;
  }

  footer a:hover {
    color: var(--text-1);
    border-color: var(--text-3);
  }

  /* Mobile */
  @media (max-width: 720px) {
    .container { padding: 32px 20px 56px; }
    .hero { padding: 56px 0 48px; }
    .hero-row { gap: 24px; }
    .hero-meta { align-items: flex-start; text-align: left; min-width: 0; }
    .sensor-grid { grid-template-columns: 1fr; }
    .sensor-card { padding: 24px; }
    .chart-wrap { padding: 20px; }
    .chart-canvas-wrap { height: 240px; }
    .log-table th, .log-table td { padding: 12px 16px; }
    section { padding: 40px 0; }
    .section-head { margin-bottom: 24px; }
  }
</style>
</head>
<body>
  <div class="container">

    <div class="topbar">
      <div class="brand">
        <span class="brand-dot" id="brand-dot"></span>
        <span>PotPi</span>
      </div>
      <div class="status-pill">
        <span class="pulse" id="status-pulse"></span>
        <span id="status-text">Live</span>
      </div>
    </div>

    <!-- HERO -->
    <div class="hero">
      <div class="eyebrow">Soil moisture</div>
      <div class="hero-row">
        <div class="hero-number">
          <span id="hero-value">--</span><span class="hero-unit">%</span>
        </div>
        <div class="hero-meta">
          <div>
            <div class="hero-meta-label">Last reading</div>
            <div class="hero-meta-value mono" id="last-reading">--</div>
          </div>
          <div>
            <div class="hero-meta-label">Device</div>
            <div class="hero-meta-value mono" id="device-name">--</div>
          </div>
        </div>
      </div>
    </div>

    <!-- HEALTH (conditional) -->
    <div id="health-section"></div>

    <!-- SENSORS -->
    <section>
      <div class="section-head">
        <div class="section-title">Sensors</div>
      </div>
      <div class="sensor-grid">
        <div class="sensor-card">
          <div class="sensor-card-head">
            <span class="sensor-name">Channel 0</span>
            <span class="sensor-state"><span class="dot" id="ch0-dot"></span><span id="ch0-state">Active</span></span>
          </div>
          <div class="sensor-body">
            <div class="sensor-pct"><span id="ch0-pct">--</span><span class="unit">%</span></div>
            <div class="sensor-volt">
              <div class="sensor-volt-label">Voltage</div>
              <div class="sensor-volt-value"><span id="ch0-volt">--</span> V</div>
            </div>
          </div>
          <div class="sensor-bar"><div class="sensor-bar-fill" id="ch0-bar" style="width:0%"></div></div>
        </div>
        <div class="sensor-card">
          <div class="sensor-card-head">
            <span class="sensor-name">Channel 1</span>
            <span class="sensor-state"><span class="dot" id="ch1-dot"></span><span id="ch1-state">Active</span></span>
          </div>
          <div class="sensor-body">
            <div class="sensor-pct"><span id="ch1-pct">--</span><span class="unit">%</span></div>
            <div class="sensor-volt">
              <div class="sensor-volt-label">Voltage</div>
              <div class="sensor-volt-value"><span id="ch1-volt">--</span> V</div>
            </div>
          </div>
          <div class="sensor-bar"><div class="sensor-bar-fill" id="ch1-bar" style="width:0%"></div></div>
        </div>
      </div>
    </section>

    <!-- CHART -->
    <section>
      <div class="section-head">
        <div class="section-title">Moisture over time</div>
        <div class="window-selector" id="window-selector">
          <button class="window-btn" data-window="24h">24h</button>
          <button class="window-btn" data-window="7d">7d</button>
          <button class="window-btn" data-window="30d">30d</button>
          <button class="window-btn active" data-window="all">All</button>
        </div>
      </div>
      <div class="chart-wrap">
        <div class="chart-canvas-wrap">
          <canvas id="chart"></canvas>
          <div class="chart-empty" id="chart-empty" style="display:none">No readings in selected window</div>
        </div>
      </div>
    </section>

    <!-- WATERING -->
    <section>
      <div class="section-head">
        <div class="section-title">Watering log</div>
      </div>
      <div id="watering-container"></div>
    </section>

    <footer>
      <span>PotPi soil moisture monitor</span>
      <span>Source: <a href="https://github.com/PhilWicke/potpi" target="_blank" rel="noopener">github.com/PhilWicke/potpi</a></span>
    </footer>

  </div>

<script>
(function() {
  'use strict';

  const state = {
    rows: [],
    window: 'all',
    chart: null
  };

  // ---------- Data loading ----------
  async function loadData() {
    try {
      const indexResp = await fetch('data/index.json', { cache: 'no-cache' });
      if (!indexResp.ok) throw new Error('index.json missing');
      const index = await indexResp.json();
      const files = (index.files || []);

      const all = [];
      for (const f of files) {
        try {
          const r = await fetch(f, { cache: 'no-cache' });
          if (!r.ok) continue;
          const text = await r.text();
          const parsed = parseCSV(text);
          all.push(...parsed);
        } catch (e) {
          // skip
        }
      }

      // Filter out smoke devices
      const filtered = all.filter(r => !(r.device && r.device.toLowerCase().startsWith('smoke')));
      filtered.sort((a, b) => a.ts - b.ts);
      state.rows = filtered;
      render();
    } catch (e) {
      renderEmpty();
    }
  }

  function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    if (lines.length < 2) return [];
    const header = lines[0].split(',').map(s => s.trim());
    const idx = {};
    header.forEach((h, i) => { idx[h] = i; });
    const rows = [];
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',');
      if (cols.length < header.length) continue;
      const ts = new Date(cols[idx.timestamp]);
      if (isNaN(ts.getTime())) continue;
      rows.push({
        ts,
        v0: parseFloat(cols[idx.voltage_ch0]),
        v1: parseFloat(cols[idx.voltage_ch1]),
        p0: parseFloat(cols[idx.percent_ch0]),
        p1: parseFloat(cols[idx.percent_ch1]),
        pm: parseFloat(cols[idx.percent_mean]),
        valid: String(cols[idx.valid]).trim().toLowerCase() === 'true',
        watered: String(cols[idx.watered]).trim().toLowerCase() === 'true',
        pump: parseFloat(cols[idx.pump_seconds]) || 0,
        device: (cols[idx.device] || '').trim()
      });
    }
    return rows;
  }

  // ---------- Rendering ----------
  function render() {
    if (!state.rows.length) {
      renderEmpty();
      return;
    }

    const latest = state.rows[state.rows.length - 1];

    // Hero
    document.getElementById('hero-value').textContent = formatPct(latest.pm);
    document.getElementById('last-reading').textContent = formatRelativeOrAbsolute(latest.ts);
    document.getElementById('device-name').textContent = latest.device || '—';

    // Brand dot color reflects validity
    const brandDot = document.getElementById('brand-dot');
    if (!latest.valid) {
      brandDot.classList.add('invalid');
    } else {
      brandDot.classList.remove('invalid');
    }

    // Sensors
    setSensor('ch0', latest.p0, latest.v0, latest.valid);
    setSensor('ch1', latest.p1, latest.v1, latest.valid);

    // Health banner
    renderHealth(latest);

    // Chart
    renderChart();

    // Watering log
    renderWatering();
  }

  function setSensor(prefix, pct, volt, valid) {
    document.getElementById(prefix + '-pct').textContent = formatPct(pct);
    document.getElementById(prefix + '-volt').textContent = isFinite(volt) ? volt.toFixed(4) : '—';
    const bar = document.getElementById(prefix + '-bar');
    const w = Math.max(0, Math.min(100, isFinite(pct) ? pct : 0));
    bar.style.width = w + '%';
    const stateEl = document.getElementById(prefix + '-state');
    const dotEl = document.getElementById(prefix + '-dot');
    if (valid) {
      stateEl.textContent = 'Active';
      dotEl.style.background = 'var(--accent)';
    } else {
      stateEl.textContent = 'Check';
      dotEl.style.background = 'var(--error)';
    }
  }

  function renderHealth(latest) {
    const container = document.getElementById('health-section');
    container.innerHTML = '';
    if (!latest.valid) {
      const div = document.createElement('div');
      div.style.paddingTop = '40px';
      div.innerHTML = `
        <div class="health-banner">
          <span class="health-banner-dot"></span>
          <div class="health-banner-text">
            <span class="label">Sensor warning</span>
            <span>Latest reading flagged as invalid. Check sensor placement and wiring.</span>
          </div>
        </div>
      `;
      container.appendChild(div);
    }
  }

  function renderEmpty() {
    document.getElementById('hero-value').textContent = '—';
    document.getElementById('last-reading').textContent = 'No data';
    document.getElementById('device-name').textContent = '—';
    document.getElementById('ch0-pct').textContent = '—';
    document.getElementById('ch1-pct').textContent = '—';
    document.getElementById('ch0-volt').textContent = '—';
    document.getElementById('ch1-volt').textContent = '—';
    document.getElementById('chart-empty').textContent = 'No readings available';
    document.getElementById('chart-empty').style.display = 'flex';
    document.getElementById('watering-container').innerHTML = `<div class="log-empty">No watering events recorded yet</div>`;
  }

  // ---------- Chart ----------
  function getWindowed() {
    const now = Date.now();
    let cutoff = null;
    if (state.window === '24h') cutoff = now - 24 * 3600 * 1000;
    else if (state.window === '7d') cutoff = now - 7 * 24 * 3600 * 1000;
    else if (state.window === '30d') cutoff = now - 30 * 24 * 3600 * 1000;
    if (cutoff === null) return state.rows.slice();
    return state.rows.filter(r => r.ts.getTime() >= cutoff);
  }

  function renderChart() {
    const data = getWindowed();
    const emptyEl = document.getElementById('chart-empty');
    const canvas = document.getElementById('chart');

    if (!data.length) {
      emptyEl.textContent = 'No readings in selected window';
      emptyEl.style.display = 'flex';
      if (state.chart) { state.chart.destroy(); state.chart = null; }
      return;
    }
    emptyEl.style.display = 'none';

    const points = data.map(r => ({ x: r.ts, y: isFinite(r.pm) ? r.pm : null }));
    const singlePoint = points.length === 1;

    const ds = {
      label: 'Moisture',
      data: points,
      borderColor: '#34D399',
      backgroundColor: '#34D399',
      borderWidth: 1,
      pointRadius: singlePoint ? 5 : 0,
      pointHoverRadius: 5,
      pointBackgroundColor: '#34D399',
      pointBorderColor: '#0A0A0A',
      pointBorderWidth: singlePoint ? 2 : 1,
      tension: 0.25,
      fill: false,
      spanGaps: true
    };

    // Determine time unit
    const span = points.length > 1
      ? (points[points.length - 1].x - points[0].x) / 1000
      : 0;
    let timeUnit = 'hour';
    if (span > 30 * 86400) timeUnit = 'week';
    else if (span > 5 * 86400) timeUnit = 'day';
    else if (span > 36 * 3600) timeUnit = 'day';
    else timeUnit = 'hour';

    // For single point, pad x-axis
    let xMin, xMax;
    if (singlePoint) {
      const t = points[0].x.getTime();
      xMin = new Date(t - 3600 * 1000);
      xMax = new Date(t + 3600 * 1000);
    }

    if (state.chart) state.chart.destroy();

    const ctx = canvas.getContext('2d');
    state.chart = new Chart(ctx, {
      type: 'line',
      data: { datasets: [ds] },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0A0A0A',
            borderColor: 'rgba(255,255,255,0.12)',
            borderWidth: 1,
            titleColor: '#FAFAFA',
            bodyColor: '#A3A3A3',
            titleFont: { family: 'Geist Mono', size: 11, weight: '500' },
            bodyFont: { family: 'Geist Mono', size: 12 },
            padding: 10,
            displayColors: false,
            callbacks: {
              title: (items) => {
                const d = new Date(items[0].parsed.x);
                return d.toLocaleString(undefined, {
                  year: 'numeric', month: 'short', day: '2-digit',
                  hour: '2-digit', minute: '2-digit'
                });
              },
              label: (item) => `${item.parsed.y.toFixed(1)}%`
            }
          }
        },
        scales: {
          x: {
            type: 'time',
            time: { unit: timeUnit },
            min: xMin,
            max: xMax,
            grid: {
              color: 'rgba(255,255,255,0.04)',
              drawTicks: false
            },
            border: { display: false },
            ticks: {
              color: '#525252',
              font: { family: 'Geist Mono', size: 10 },
              maxRotation: 0,
              autoSkipPadding: 20
            }
          },
          y: {
            min: 0,
            max: 100,
            grid: {
              color: 'rgba(255,255,255,0.04)',
              drawTicks: false
            },
            border: { display: false },
            ticks: {
              color: '#525252',
              font: { family: 'Geist Mono', size: 10 },
              stepSize: 25,
              callback: (v) => v + '%',
              padding: 8
            }
          }
        }
      }
    });
  }

  // ---------- Watering ----------
  function renderWatering() {
    const container = document.getElementById('watering-container');
    const events = state.rows.filter(r => r.watered);
    if (!events.length) {
      container.innerHTML = `<div class="log-empty">No watering events recorded yet</div>`;
      return;
    }
    const recent = events.slice().reverse().slice(0, 25);
    const rows = recent.map(e => `
      <tr>
        <td class="mono">${formatAbsolute(e.ts)}</td>
        <td class="mono">${e.pump ? e.pump.toFixed(1) + ' s' : '—'}</td>
        <td class="mono">${isFinite(e.pm) ? e.pm.toFixed(1) + '%' : '—'}</td>
        <td class="mono" style="color:var(--text-3)">${e.device || '—'}</td>
      </tr>
    `).join('');
    container.innerHTML = `
      <table class="log-table">
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Pump</th>
            <th>Moisture</th>
            <th>Device</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  // ---------- Formatting ----------
  function formatPct(v) {
    if (!isFinite(v)) return '—';
    return v.toFixed(1);
  }

  function formatRelativeOrAbsolute(ts) {
    const now = Date.now();
    const diff = (now - ts.getTime()) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) {
      const m = Math.round(diff / 60);
      return m + ' min ago';
    }
    if (diff < 86400) {
      const h = Math.round(diff / 3600);
      return h + ' hr ago';
    }
    if (diff < 7 * 86400) {
      const d = Math.round(diff / 86400);
      return d + ' day' + (d === 1 ? '' : 's') + ' ago';
    }
    return formatAbsolute(ts);
  }

  function formatAbsolute(ts) {
    return ts.toLocaleString(undefined, {
      year: 'numeric', month: 'short', day: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });
  }

  // ---------- Window selector ----------
  document.querySelectorAll('.window-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.window-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.window = btn.dataset.window;
      renderChart();
    });
  });

  // Boot
  loadData();
})();
</script>
</body>
</html>
